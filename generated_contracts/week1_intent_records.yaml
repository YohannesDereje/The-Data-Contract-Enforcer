kind: DataContract
apiVersion: v3.0.0
id: week1-contract-v1
info:
  title: Week1 Contract
  version: 1.0.0
servers:
  local:
    type: local
    path: outputs/week1/intent_records.jsonl
    format: jsonl
schema:
  type: object
  properties:
    intent_id:
      type: string
      description: Field 'intent_id' of type string.
      required: true
      unique: false
    description:
      type: string
      description: Field 'description' of type string.
      required: true
      unique: false
    created_at:
      type: string
      description: Field 'created_at' of type string.
      required: true
      unique: false
    governance_tags:
      type: array
      items:
        type: string
    code_refs:
      type: array
      items:
        type: object
        properties:
          file:
            type: string
          line_start:
            type: number
          line_end:
            type: number
          symbol:
            type: string
          confidence:
            type: number
quality:
  type: SodaChecks
  checks:
  - type: missing_count
    column: file
    must_be: '='
    value: 0
    name: file_no_missing_values
  - type: missing_count
    column: line_start
    must_be: '='
    value: 0
    name: line_start_no_missing_values
  - type: min
    column: line_start
    must_be: '>='
    value: 11
    name: line_start_min_value
  - type: max
    column: line_start
    must_be: <=
    value: 48
    name: line_start_max_value
  - type: missing_count
    column: line_end
    must_be: '='
    value: 0
    name: line_end_no_missing_values
  - type: min
    column: line_end
    must_be: '>='
    value: 18
    name: line_end_min_value
  - type: max
    column: line_end
    must_be: <=
    value: 72
    name: line_end_max_value
  - type: missing_count
    column: symbol
    must_be: '='
    value: 0
    name: symbol_no_missing_values
  - type: missing_count
    column: confidence
    must_be: '='
    value: 0
    name: confidence_no_missing_values
  - type: min
    column: confidence
    must_be: '>='
    value: 0.0
    name: confidence_min_value
  - type: max
    column: confidence
    must_be: <=
    value: 1.0
    name: confidence_max_value
  - type: missing_count
    column: meta_intent_id
    must_be: '='
    value: 0
    name: meta_intent_id_no_missing_values
  - type: missing_count
    column: meta_description
    must_be: '='
    value: 0
    name: meta_description_no_missing_values
  - type: missing_count
    column: meta_created_at
    must_be: '='
    value: 0
    name: meta_created_at_no_missing_values
lineage:
  downstream: []
