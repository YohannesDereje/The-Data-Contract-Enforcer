kind: DataContract
apiVersion: v3.0.0
id: week3-contract-v1
info:
  title: Week3 Contract
  version: 1.0.0
servers:
  local:
    type: local
    path: outputs/week3/extractions.jsonl
    format: jsonl
schema:
  type: object
  properties:
    doc_id:
      type: string
      description: Field 'doc_id' of type string.
      required: true
      unique: false
    source_path:
      type: string
      description: Field 'source_path' of type string.
      required: true
      unique: false
    source_hash:
      type: string
    extracted_facts:
      type: array
      items:
        type: object
        properties:
          fact_id:
            type: string
          text:
            type: string
          confidence:
            type: number
          page_ref:
            type: number
          source_excerpt:
            type: string
          entity_refs:
            type: array
            items:
              type: string
    entities:
      type: array
      items:
        type: object
        properties:
          entity_id:
            type: string
          name:
            type: string
          type:
            type: string
          canonical_value:
            type: string
    extraction_model:
      type: string
      description: Field 'extraction_model' of type string.
      required: true
      unique: false
    processing_time_ms:
      type: number
    token_count:
      type: object
      properties:
        input:
          type: number
        output:
          type: number
    extracted_at:
      type: string
      description: Field 'extracted_at' of type string.
      required: true
      unique: true
quality:
  type: SodaChecks
  checks:
  - type: missing_count
    column: fact_id
    must_be: '='
    value: 0
    name: fact_id_no_missing_values
  - type: duplicate_count
    column: fact_id
    must_be: '='
    value: 0
    name: fact_id_no_duplicates
  - type: missing_count
    column: text
    must_be: '='
    value: 0
    name: text_no_missing_values
  - type: missing_count
    column: confidence
    must_be: '='
    value: 0
    name: confidence_no_missing_values
  - type: min
    column: confidence
    must_be: '>='
    value: 0.0
    name: confidence_min_value
  - type: max
    column: confidence
    must_be: <=
    value: 1.0
    name: confidence_max_value
  - type: missing_count
    column: page_ref
    must_be: '='
    value: 0
    name: page_ref_no_missing_values
  - type: min
    column: page_ref
    must_be: '>='
    value: 1
    name: page_ref_min_value
  - type: max
    column: page_ref
    must_be: <=
    value: 50
    name: page_ref_max_value
  - type: missing_count
    column: source_excerpt
    must_be: '='
    value: 0
    name: source_excerpt_no_missing_values
  - type: missing_count
    column: entity_refs
    must_be: '='
    value: 0
    name: entity_refs_no_missing_values
  - type: missing_count
    column: meta_doc_id
    must_be: '='
    value: 0
    name: meta_doc_id_no_missing_values
  - type: missing_count
    column: meta_source_path
    must_be: '='
    value: 0
    name: meta_source_path_no_missing_values
  - type: missing_count
    column: meta_extraction_model
    must_be: '='
    value: 0
    name: meta_extraction_model_no_missing_values
  - type: missing_count
    column: meta_extracted_at
    must_be: '='
    value: 0
    name: meta_extracted_at_no_missing_values
  - type: duplicate_count
    column: meta_extracted_at
    must_be: '='
    value: 0
    name: meta_extracted_at_no_duplicates
  - type: missing_count
    column: meta_token_count.input
    must_be: '='
    value: 0
    name: meta_token_count.input_no_missing_values
  - type: min
    column: meta_token_count.input
    must_be: '>='
    value: 512
    name: meta_token_count.input_min_value
  - type: max
    column: meta_token_count.input
    must_be: <=
    value: 4096
    name: meta_token_count.input_max_value
  - type: missing_count
    column: meta_token_count.output
    must_be: '='
    value: 0
    name: meta_token_count.output_no_missing_values
  - type: min
    column: meta_token_count.output
    must_be: '>='
    value: 256
    name: meta_token_count.output_min_value
  - type: max
    column: meta_token_count.output
    must_be: <=
    value: 1024
    name: meta_token_count.output_max_value
lineage:
  downstream:
  - contract_id: week3-contract-v1
    subscriber_id: week4-cartographer
    subscriber_team: week4-data-lineage
    fields_consumed:
    - doc_id
    - extracted_facts
    breaking_fields:
    - field: doc_id
      reason: Primary key for node identity in the lineage graph.
    - field: extracted_facts.confidence
      reason: Used for weighting edges; a scale change breaks ranking logic.
    validation_mode: ENFORCE
    registered_at: '2026-03-15T10:00:00Z'
    contact: week4-team-lead@example.com
