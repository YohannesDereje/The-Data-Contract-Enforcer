version: 2
models:
- name: week5_extractions
  columns:
  - name: event_id
    tests:
    - not_null
    - unique
  - name: event_type
    tests:
    - not_null
  - name: aggregate_id
    tests: []
  - name: aggregate_type
    tests:
    - not_null
    - accepted_values:
        values:
        - LoanApplication
  - name: sequence_number
    tests: []
  - name: schema_version
    tests:
    - not_null
    - accepted_values:
        values:
        - '1.0'
  - name: occurred_at
    tests: []
  - name: recorded_at
    tests: []
  - name: metadata.causation_id
    tests: []
  - name: metadata.correlation_id
    tests: []
  - name: metadata.user_id
    tests:
    - not_null
    - accepted_values:
        values:
        - system
  - name: metadata.source_service
    tests:
    - not_null
    - accepted_values:
        values:
        - database-export
